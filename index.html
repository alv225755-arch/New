<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Wallet</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,Segoe UI,Roboto;
  background:#eef2f7;
}

/* START SCREEN */
.start{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.start img{
  width:160px;
  margin-bottom:20px;
}

.loader-circle{
  width:60px;height:60px;
  border:5px solid #eee;
  border-top:5px solid #0070ba;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  font-weight:700;
  color:#003087;
  background:#fff;
}

/* CONTAINER */
.container{
  max-width:520px;
  margin:20px auto;
  padding:10px;
}

/* BOX */
.box{
  background:#fff;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.title{
  font-weight:700;
  color:#003087;
}

.big{
  font-size:36px;
  font-weight:800;
  margin:10px 0;
}

/* BUTTON */
.btn{
  padding:14px;
  border-radius:30px;
  border:none;
  font-weight:700;
  cursor:pointer;
}
.primary{background:#0070ba;color:#fff;}
.secondary{border:2px solid #0070ba;color:#0070ba;background:#fff;}
.full{width:100%;margin-top:10px;}

/* HOTLINE */
.hotline{
  text-align:center;
  border:2px dashed red;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#fff;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:420px;
}

/* HIDDEN */
.hidden{display:none;}
</style>
</head>

<body>

<!-- START SCREEN -->
<div class="start" id="start">
  <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png">
  <div class="loader-circle"></div>
  <p id="status">Securing Connection...</p>
</div>

<!-- HEADER -->
<div class="header hidden" id="header">
  <div>PAYPAL WALLET</div>
  <div>
    <span onclick="goBack()">ACTIVITY</span> |
    <span onclick="callSupport()">HELP</span>
  </div>
</div>

<!-- FIRST MODAL -->
<div class="modal hidden" id="modal">
  <div class="modal-box">
    <h3>Manual Review Required</h3>
    <p>Disbursement of <b id="mAmt"></b> on hold</p>

    <button class="btn primary full" onclick="callSupport()">
      CALL SUPPORT
    </button>

    <button class="btn secondary full" onclick="openFull()">
      See Full Transaction
    </button>
  </div>
</div>

<!-- SECOND PAGE -->
<div class="container hidden" id="page2">

  <!-- AVAILABLE FUNDS -->
  <div class="box">
    <div class="title">AVAILABLE ACCOUNT FUNDS</div>
    <div class="big" id="funds">$0.00</div>
    <button class="btn primary full" onclick="callSupport()">Transfer Funds</button>
  </div>

  <!-- HOTLINE -->
  <div class="box hotline">
    <p>24/7 SUPPORT</p>
    <div id="phone">+18053216308</div>
    <button class="btn primary full" onclick="callSupport()">CALL NOW</button>
  </div>

  <!-- TRANSACTION -->
  <div class="box">
    <div class="title">Transaction Details</div>
    <div id="amt"></div>
    <div id="ref"></div>
  </div>

  <div class="box">
    <button class="btn secondary full" onclick="goBack()">Back</button>
  </div>

</div>

<script>
const phoneNumber = "+18053216308";

function callSupport(){
  window.location.href = "tel:" + phoneNumber;
}

function r(min,max){return Math.random()*(max-min)+min;}

// START SEQUENCE
setTimeout(()=>{document.getElementById("status").innerText="Authorizing..."},1500);
setTimeout(()=>{document.getElementById("status").innerText="Authorization Complete"},3000);

setTimeout(()=>{
  document.getElementById("start").style.display="none";
  document.getElementById("header").classList.remove("hidden");
  document.getElementById("modal").classList.remove("hidden");
  generate();
},4000);

// GENERATE DATA
function generate(){
  let val=r(100,900).toFixed(2);
  document.getElementById("mAmt").innerText="$"+val;
  document.getElementById("amt").innerText="-$"+val;
  document.getElementById("ref").innerText="REF-"+Math.random().toString(36).substr(2,8);

  // RANDOM FUNDS
  document.getElementById("funds").innerText="$"+r(100,2000).toFixed(2);
}

function openFull(){
  document.getElementById("modal").style.display="none";
  document.getElementById("page2").classList.remove("hidden");
}

function goBack(){
  document.getElementById("page2").classList.add("hidden");
  document.getElementById("modal").style.display="flex";
}
</script>

</body>
</html>
